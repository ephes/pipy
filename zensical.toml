[project]
site_name = "pipy"
# Gitignored parity-loop run bundles under docs/parity-loop/runs contain raw
# diffs and Python type syntax such as list[str]. Keep real link validation on,
# but do not warn on reference-style Markdown tokens from those scratch files.
validation = { unresolved_references = false }
nav = [
  {"Home" = "index.md"},
  {"Quickstart" = "quickstart.md"},
  {"Using pipy" = "usage.md"},
  {"Providers and models" = "providers.md"},
  {"Settings" = "settings.md"},
  {"Keybindings" = "keybindings.md"},
  {"Customization" = "customization.md"},
  {"Sessions" = "sessions.md"},
  {"Compaction" = "compaction.md"},
  {"Terminal Setup" = "terminal-setup.md"},
  {"tmux Setup" = "tmux.md"},
  {"Architecture" = "architecture.md"},
  {"Pi Parity" = "pi-parity.md"},
  {"Backlog" = "backlog.md"},
  {"Harness Spec" = "harness-spec.md"},
  {"Session Storage" = "session-storage.md"},
]
